version: "3.8"

services:
  nanotune:
    build: .
    image: nanotune:local
    container_name: nanotune
    restart: always
    init: true
    ports:
      - "8080:8787"
    environment:
      # Web access password. Leave empty to disable password protection.
      - PASSWORD=${PASSWORD:-your_secure_password_here}

      # Music provider switch:
      #   default = original GD music API flow
      #   j8y     = j8y gateway provider below
      - MUSIC_API_PROVIDER=${MUSIC_API_PROVIDER:-j8y}
      - J8Y_APP_KEY=${J8Y_APP_KEY:-replace_with_your_own_key}
      - J8Y_API_BASE=${J8Y_API_BASE:-https://api.j8y.cn/api/gateway.php}
      - J8Y_API_PATHS=${J8Y_API_PATHS:-wy_music,znnu_music}
      - J8Y_LEVEL=${J8Y_LEVEL:-standard}

      # Original provider base URL, still used when MUSIC_API_PROVIDER=default.
      - API_BASE_URL=${API_BASE_URL:-https://music-api.gdstudio.xyz/api.php}

      # Optional UI language: set to ENG for English.
      # - language=ENG
    volumes:
      - ./data:/data
